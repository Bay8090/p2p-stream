<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Streamer P2P Pro</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --red: #ff0000; --bg: #000; --ui: rgba(15, 15, 15, 0.98); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: var(--bg); color: #fff; height: 100vh; overflow: hidden; position: fixed; width: 100%; }
        .app { height: 100%; display: flex; flex-direction: column; }
        .video-box { flex: 1; position: relative; background: #000; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; max-height: 100%; }
        .overlay { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: space-between; padding: 10px; pointer-events: none; }
        .top { display: flex; justify-content: space-between; pointer-events: auto; }
        .badge { background: rgba(0,0,0,0.7); padding: 6px 12px; border-radius: 20px; font-size: 11px; border: 1px solid #444; }
        .toolbar { background: var(--ui); padding: 15px 10px 35px 10px; display: flex; gap: 8px; border-top: 1px solid #333; z-index: 100; }
        .btn { flex: 1; padding: 14px 5px; border: none; border-radius: 8px; background: #222; color: #fff; font-weight: bold; font-size: 13px; }
        .btn-main { background: var(--red); }
        .panel { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; flex-direction: column; z-index: 200; padding: 20px; }
        .panel.active { display: flex; }
        .panel-content { background: #1a1a1a; padding: 20px; border-radius: 15px; text-align: center; margin: auto 0; border: 1px solid #333; }
        input[type="text"] { width: 100%; padding: 12px; margin: 10px 0; background: #000; color: #fff; border: 1px solid #444; border-radius: 8px; }
        #chatBox { flex: 1; overflow-y: auto; padding: 10px; border-bottom: 1px solid #333; margin-bottom: 10px; }
        .msg { margin-bottom: 8px; font-size: 14px; text-align: left; }
        .msg b { color: var(--red); }
    </style>
</head>
<body>

<div class="app">
    <div class="video-box" id="vBox">
        <video id="v" playsinline crossorigin="anonymous"></video>
        <div class="overlay">
            <div class="top">
                <div class="badge" id="status">Iniciando...</div>
                <div class="badge" id="peerCount">Oyentes: 0</div>
            </div>
        </div>
    </div>

    <div class="toolbar">
        <button class="btn btn-main" onclick="document.getElementById('file').click()">📁 Transmitir</button>
        <button class="btn" onclick="showPanel('invite')">👥 Invitar</button>
        <button class="btn" onclick="showPanel('chat')">💬 Chat</button>
    </div>
</div>

<input type="file" id="file" hidden accept="video/*" onchange="startStream(event)">

<div id="invite" class="panel" onclick="closePanels()">
    <div class="panel-content" onclick="event.stopPropagation()">
        <h3>Modo Emisora</h3>
        <p style="font-size: 12px; color: #aaa; margin: 10px 0;">Tu amigo recibirá tu señal de video en vivo.</p>
        <input type="text" id="link" readonly>
        <button class="btn btn-main" style="width: 100%;" onclick="copy()">Copiar Enlace</button>
        <button class="btn" style="width: 100%; margin-top: 10px; background:none;" onclick="closePanels()">Cerrar</button>
    </div>
</div>

<div id="chat" class="panel">
    <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
        <h3>Chat de la Sala</h3>
        <button onclick="closePanels()" style="background:none; border:none; color:#fff; font-size:20px;">✕</button>
    </div>
    <div id="chatBox"></div>
    <div style="display:flex; gap:8px;">
        <input type="text" id="msgIn" placeholder="Escribe..." style="margin:0;">
        <button class="btn btn-main" onclick="send()" style="flex:0 0 60px;">➤</button>
    </div>
</div>

<script>
    const v = document.getElementById('v');
    let peer, conns = [], myStream;

    function init() {
        peer = new Peer();
        peer.on('open', id => {
            document.getElementById('status').innerText = "ONLINE | ID: " + id.substring(0,5);
            document.getElementById('link').value = window.location.origin + window.location.pathname + "#" + id;
            const hash = window.location.hash.substring(1);
            if(hash) connectToHost(hash);
        });

        // Escuchar conexiones de datos (Chat)
        peer.on('connection', c => setupData(c));

        // Escuchar llamadas de video (Recibir el Stream)
        peer.on('call', call => {
            call.answer();
            call.on('stream', remoteStream => {
                v.srcObject = remoteStream;
                v.play();
            });
        });
    }

    function startStream(e) {
        const f = e.target.files[0];
        if(!f) return;
        v.src = URL.createObjectURL(f);
        v.play();
        
        // Capturar Stream y enviarlo a todos
        setTimeout(() => {
            myStream = v.captureStream ? v.captureStream() : v.mozCaptureStream();
            conns.forEach(c => {
                peer.call(c.peer, myStream);
            });
            addMsg("Sistema", "Transmitiendo señal...");
        }, 1000);
    }

    function connectToHost(id) {
        const c = peer.connect(id);
        setupData(c);
    }

    function setupData(c) {
        c.on('open', () => {
            conns.push(c);
            updateCount();
            if(myStream) peer.call(c.peer, myStream);
        });
        c.on('data', d => {
            if(d.type === 'chat') addMsg("Amigo", d.msg);
        });
    }

    function updateCount() {
        document.getElementById('peerCount').innerText = "Oyentes: " + conns.length;
    }

    function send() {
        const i = document.getElementById('msgIn');
        if(!i.value) return;
        addMsg("Tú", i.value);
        conns.forEach(c => c.open && c.send({type:'chat', msg: i.value}));
        i.value = "";
    }

    function addMsg(u, m) {
        const b = document.getElementById('chatBox');
        b.innerHTML += `<div class="msg"><b>${u}:</b> ${m}</div>`;
        b.scrollTop = b.scrollHeight;
    }

    function showPanel(id) { document.getElementById(id).classList.add('active'); }
    function closePanels() { 
        document.getElementById('invite').classList.remove('active'); 
        document.getElementById('chat').classList.remove('active'); 
    }

    function copy() {
        const l = document.getElementById('link');
        l.select(); document.execCommand('copy');
        alert("Enlace de streaming copiado");
    }

    window.onload = init;
</script>
</body>
</html>
