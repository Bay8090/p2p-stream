<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Streamer P2P Directo</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --red: #ff0000; --bg: #000; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: var(--bg); color: #fff; height: 100vh; overflow: hidden; position: fixed; width: 100%; }
        .app { height: 100%; display: flex; flex-direction: column; }
        .video-box { flex: 1; position: relative; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        video { width: 100%; height: auto; max-height: 100%; background: #000; }
        .toolbar { background: rgba(15,15,15,0.95); padding: 15px 10px 35px 10px; display: flex; gap: 8px; border-top: 1px solid #333; }
        .btn { flex: 1; padding: 14px; border: none; border-radius: 8px; background: #222; color: #fff; font-weight: bold; font-size: 13px; }
        .btn-main { background: var(--red); }
        .status-bar { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; pointer-events: none; }
        .badge { background: rgba(0,0,0,0.6); padding: 5px 10px; border-radius: 15px; font-size: 10px; border: 1px solid #444; pointer-events: auto; }
        .panel { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
        .panel.active { display: flex; }
        .panel-content { background: #151515; padding: 20px; border-radius: 15px; width: 100%; text-align: center; border: 1px solid #333; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; color: #fff; border: 1px solid #444; border-radius: 8px; }
    </style>
</head>
<body>

<div class="app">
    <div class="video-box" onclick="togglePlay()">
        <video id="v" playsinline webkit-playsinline></video>
        <div class="status-bar">
            <div class="badge" id="status">Iniciando...</div>
            <div class="badge" id="mode">Modo: Receptor</div>
        </div>
    </div>

    <div class="toolbar">
        <button class="btn btn-main" onclick="document.getElementById('file').click()">📁 Emitir Video</button>
        <button class="btn" onclick="showInvite()">👥 Invitar</button>
        <button class="btn" onclick="v.muted = !v.muted">🔇/🔊</button>
    </div>
</div>

<input type="file" id="file" hidden accept="video/*" onchange="startBroadcasting(event)">

<div id="invitePanel" class="panel" onclick="this.classList.remove('active')">
    <div class="panel-content" onclick="event.stopPropagation()">
        <h3>Copia el link</h3>
        <input type="text" id="linkField" readonly>
        <button class="btn btn-main" style="width:100%" onclick="copyLink()">Copiar</button>
    </div>
</div>

<script>
    const v = document.getElementById('v');
    let peer, conns = [], myStream = null;

    function init() {
        peer = new Peer();
        peer.on('open', id => {
            document.getElementById('status').innerText = "ID: " + id.substring(0,5);
            document.getElementById('linkField').value = window.location.origin + window.location.pathname + "#" + id;
            if(window.location.hash) connectToHost(window.location.hash.substring(1));
        });

        // Receptor: Escuchar la llamada de video
        peer.on('call', call => {
            console.log("Recibiendo señal de video...");
            call.answer(); 
            call.on('stream', remoteStream => {
                v.srcObject = remoteStream;
                v.muted = true; // Forzar mute para permitir autoplay en móvil
                v.play().catch(e => console.log("Error autoplay:", e));
                document.getElementById('mode').innerText = "Modo: Viendo En Vivo";
            });
        });

        peer.on('connection', c => setupData(c));
    }

    function startBroadcasting(e) {
        const file = e.target.files[0];
        if(!file) return;
        v.srcObject = null;
        v.src = URL.createObjectURL(file);
        v.onloadedmetadata = () => {
            v.play();
            document.getElementById('mode').innerText = "Modo: Emisor";
            // Capturar stream con audio
            myStream = v.captureStream ? v.captureStream() : v.mozCaptureStream();
            conns.forEach(c => peer.call(c.peer, myStream));
        };
    }

    function connectToHost(hostId) {
        const c = peer.connect(hostId);
        setupData(c);
    }

    function setupData(c) {
        c.on('open', () => {
            conns.push(c);
            if(myStream) peer.call(c.peer, myStream);
        });
        c.on('data', d => {
            if(d.type === 'cmd') d.play ? v.play() : v.pause();
        });
    }

    function togglePlay() {
        const isPaused = v.paused;
        isPaused ? v.play() : v.pause();
        conns.forEach(c => c.open && c.send({type:'cmd', play: !isPaused}));
    }

    function showInvite() { document.getElementById('invitePanel').classList.add('active'); }
    function copyLink() {
        const f = document.getElementById('linkField');
        f.select(); document.execCommand('copy');
        alert("Link copiado");
    }

    window.onload = init;
</script>
</body>
</html>
