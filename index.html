<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Streaming P2P Móvil - WebRTC Optimizado</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 12px;
            padding-bottom: max(12px, env(safe-area-inset-bottom));
            color: #e0e0e0;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: #1e1e1e;
            border-radius: 24px;
            padding: 20px 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #333;
            margin-bottom: env(safe-area-inset-bottom);
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 500;
            margin-bottom: 20px;
            color: #fff;
            letter-spacing: -0.5px;
            text-align: center;
        }

        .video-section {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 24px;
        }

        .video-wrapper {
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            border: 1px solid #333;
            aspect-ratio: 16/9;
        }

        video {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: contain;
            background: #000;
            pointer-events: none;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin: 20px 0 10px;
        }

        button {
            background: #2c2c2e;
            border: 1px solid #3a3a3c;
            color: white;
            font-size: 1rem;
            padding: 14px 20px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            flex: 1 1 auto;
            min-width: 140px;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        button:active {
            background: #3a3a3c;
            transform: scale(0.97);
        }

        button:disabled {
            opacity: 0.4;
            pointer-events: none;
        }

        .status-card {
            background: #2c2c2e;
            border-radius: 20px;
            padding: 16px;
            margin: 16px 0;
            border-left: 4px solid #0a84ff;
            word-break: break-word;
        }

        .status-label {
            color: #98989e;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .status-value {
            color: #fff;
            font-size: 1.1rem;
            font-weight: 400;
        }

        .peer-id {
            background: #1c1c1e;
            padding: 14px;
            border-radius: 20px;
            font-size: 1rem;
            text-align: center;
            border: 1px dashed #0a84ff;
            margin-bottom: 16px;
            user-select: all;
        }

        .error-message {
            color: #ff453a;
            background: rgba(255, 69, 58, 0.1);
            padding: 12px;
            border-radius: 16px;
            border-left: 4px solid #ff453a;
            margin: 10px 0;
            display: none;
        }

        .info-text {
            color: #98989e;
            font-size: 0.85rem;
            text-align: center;
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎥 P2P Móvil · Hi-Fi</h1>
        
        <div class="video-section">
            <div class="video-wrapper">
                <video id="localVideo" autoplay muted playsinline></video>
            </div>
            <div class="video-wrapper">
                <video id="remoteVideo" autoplay playsinline></video>
            </div>
        </div>

        <div class="controls">
            <button id="startBtn" onclick="startStreaming()">Iniciar transmisión</button>
            <button id="connectBtn" onclick="connectToPeer()" disabled>Conectar a peer</button>
        </div>

        <div class="peer-id" id="peerIdDisplay">Cargando ID...</div>

        <div class="status-card">
            <div class="status-label">🎬 Estado emisor</div>
            <div class="status-value" id="senderStatus">⏳ Inicializando...</div>
        </div>

        <div class="status-card">
            <div class="status-label">📡 Estado receptor</div>
            <div class="status-value" id="receiverStatus">⏳ Esperando conexión...</div>
        </div>

        <div id="errorBox" class="error-message"></div>
        <div class="info-text">Toque conectar y pegar el ID del peer emisor</div>
    </div>

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script>
        // --- Configuración optimizada ---
        const FIXED_FPS = 24;
        const BUFFER_HINT = 0.5;
        const AUDIO_LATENCY = 0.05;

        // --- Elementos DOM ---
        const localVideo = document.getElementById('localVideo');
        const remoteVideo = document.getElementById('remoteVideo');
        const peerIdDisplay = document.getElementById('peerIdDisplay');
        const senderStatus = document.getElementById('senderStatus');
        const receiverStatus = document.getElementById('receiverStatus');
        const errorBox = document.getElementById('errorBox');
        const startBtn = document.getElementById('startBtn');
        const connectBtn = document.getElementById('connectBtn');

        // --- Variables globales ---
        let peer = null;
        let currentCall = null;
        let localStream = null;
        let mediaDestination = null;
        let audioCtx = null;
        let videoElement = null;

        // --- Inicialización PeerJS ---
        function initPeer() {
            if (peer) return;

            peer = new Peer({
                config: {
                    'iceServers': [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun1.l.google.com:19302' }
                    ]
                },
                debug: 1
            });

            peer.on('open', (id) => {
                peerIdDisplay.textContent = `🆔 ${id}`;
                connectBtn.disabled = false;
                updateSenderStatus('Listo para transmitir');
            });

            peer.on('call', async (call) => {
                updateReceiverStatus('📞 Recibiendo llamada...');
                
                if (!localStream) {
                    showError('El emisor aún no ha iniciado la transmisión');
                    call.close();
                    return;
                }

                currentCall = call;
                call.answer(localStream);

                call.on('stream', (remoteStream) => {
                    attachRemoteStream(remoteStream);
                    updateReceiverStatus('✅ Conectado y recibiendo');
                });

                call.on('error', (err) => {
                    showError(`Error en llamada: ${err.message}`);
                    updateReceiverStatus('❌ Error en conexión');
                });

                call.on('close', () => {
                    updateReceiverStatus('📴 Conexión cerrada');
                    remoteVideo.srcObject = null;
                });
            });

            peer.on('error', (err) => {
                showError(`PeerJS error: ${err.message}`);
                if (err.type === 'unavailable-id' || err.type === 'invalid-id') {
                    peerIdDisplay.textContent = '⚠️ Error - recarga la página';
                }
            });
        }

        // --- Función principal para iniciar transmisión ---
        async function startStreaming() {
            try {
                startBtn.disabled = true;
                updateSenderStatus('🎥 Solicitando archivo de video...');

                const fileInput = document.createElement('input');
                fileInput.type = 'file';
                fileInput.accept = 'video/*,audio/*';
                fileInput.style.display = 'none';

                const fileSelected = new Promise((resolve, reject) => {
                    fileInput.onchange = () => {
                        const file = fileInput.files[0];
                        if (file) resolve(file);
                        else reject(new Error('No se seleccionó archivo'));
                    };
                    fileInput.onerror = reject;
                    document.body.appendChild(fileInput);
                    fileInput.click();
                });

                const videoFile = await fileSelected;
                document.body.removeChild(fileInput);
                
                updateSenderStatus('📂 Cargando video...');
                
                videoElement = document.createElement('video');
                videoElement.src = URL.createObjectURL(videoFile);
                videoElement.crossOrigin = 'anonymous';
                videoElement.playsInline = true;
                videoElement.muted = true;
                videoElement.loop = false;
                
                await new Promise((resolve) => {
                    videoElement.onloadedmetadata = resolve;
                });

                try {
                    await videoElement.play();
                } catch (playErr) {
                    showError('Reproducción automática bloqueada, toque "Iniciar" de nuevo');
                    startBtn.disabled = false;
                    return;
                }

                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                mediaDestination = audioCtx.createMediaStreamDestination();
                
                const source = audioCtx.createMediaElementSource(videoElement);
                source.connect(mediaDestination);
                source.connect(audioCtx.destination);

                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 640;
                canvas.height = 360;

                let lastTime = 0;
                const fpsInterval = 1000 / FIXED_FPS;
                
                const canvasStream = canvas.captureStream(FIXED_FPS);
                
                const audioTracks = mediaDestination.stream.getAudioTracks();
                if (audioTracks.length > 0) {
                    canvasStream.addTrack(audioTracks[0]);
                }

                function drawFrame() {
                    if (!videoElement.paused && !videoElement.ended) {
                        const now = performance.now();
                        const elapsed = now - lastTime;
                        
                        if (elapsed >= fpsInterval) {
                            ctx.drawImage(videoElement, 0, 0, canvas.width, canvas.height);
                            lastTime = now - (elapsed % fpsInterval);
                        }
                    }
                    requestAnimationFrame(drawFrame);
                }
                requestAnimationFrame(drawFrame);

                localVideo.srcObject = canvasStream;
                localStream = canvasStream;

                updateSenderStatus(`✅ Transmitiendo a ${FIXED_FPS} FPS · Audio Hi-Fi`);
                
                connectBtn.disabled = false;
                showError('');

            } catch (err) {
                showError(`Error al iniciar: ${err.message}`);
                updateSenderStatus('❌ Falló la captura');
                startBtn.disabled = false;
            }
        }

        // --- Conectar a un peer remoto ---
        function connectToPeer() {
            const remoteId = prompt('Ingresa el ID del peer emisor:', '');
            if (!remoteId || !peer) return;

            if (!localStream) {
                showError('Debes iniciar la transmisión primero');
                return;
            }

            updateReceiverStatus('📞 Llamando...');
            
            const call = peer.call(remoteId, localStream);
            currentCall = call;

            call.on('stream', (remoteStream) => {
                attachRemoteStream(remoteStream);
                updateReceiverStatus('✅ Conectado y recibiendo');
            });

            call.on('error', (err) => {
                showError(`Error en llamada: ${err.message}`);
                updateReceiverStatus('❌ Error');
            });

            call.on('close', () => {
                updateReceiverStatus('📴 Conexión cerrada');
                remoteVideo.srcObject = null;
            });
        }

        // --- Asignar stream remoto con gestión de buffer y autoplay ---
        function attachRemoteStream(stream) {
            if (remoteVideo.playbackRate && remoteVideo.playoutDelayHint !== undefined) {
                remoteVideo.playoutDelayHint = BUFFER_HINT;
            }

            remoteVideo.srcObject = stream;

            const playPromise = remoteVideo.play();
            
            if (playPromise !== undefined) {
                playPromise.catch(error => {
                    showError('Reproducción bloqueada, silenciando automáticamente');
                    remoteVideo.muted = true;
                    
                    remoteVideo.play().then(() => {
                        updateReceiverStatus('🔇 Audio silenciado (toca para activar)');
                        
                        remoteVideo.addEventListener('click', () => {
                            remoteVideo.muted = false;
                            updateReceiverStatus('🔊 Audio activado');
                        }, { once: true });
                        
                    }).catch(e => {
                        showError('No se puede reproducir incluso silenciado');
                    });
                });
            }

            if ('latencyHint' in remoteVideo) {
                try { remoteVideo.latencyHint = 'playout'; } catch(e) {}
            }
        }

        // --- Helpers UI ---
        function updateSenderStatus(msg) {
            senderStatus.textContent = msg;
        }

        function updateReceiverStatus(msg) {
            receiverStatus.textContent = msg;
        }

        function showError(msg) {
            if (msg) {
                errorBox.style.display = 'block';
                errorBox.textContent = `⚠️ ${msg}`;
            } else {
                errorBox.style.display = 'none';
            }
        }

        // --- Inicialización ---
        window.addEventListener('load', () => {
            initPeer();
            
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        });

        window.addEventListener('beforeunload', () => {
            if (currentCall) currentCall.close();
            if (peer) peer.destroy();
            if (audioCtx) audioCtx.close();
            if (videoElement) {
                videoElement.pause();
                URL.revokeObjectURL(videoElement.src);
            }
        });
    </script>
</body>
</html>
