<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>P2P Cinema Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app" id="app">
        <div class="video-container" id="videoContainer">
            <video id="videoPlayer" playsinline></video>
            <div class="controls-overlay" id="controlsOverlay">
                <div class="top-bar">
                    <span class="status-badge" id="peerIdDisplay">Conectando...</span>
                    <button class="icon-btn" id="fullscreenBtn">⛶</button>
                </div>
                <div class="bottom-bar">
                    <div class="progress-container" id="progressContainer">
                        <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
                    </div>
                    <div class="main-controls">
                        <button class="play-btn" id="playPauseBtn">▶</button>
                        <span class="time-text" id="timeDisplay">00:00 / 00:00</span>
                    </div>
                </div>
            </div>
        </div>
        <div class="action-bar">
            <button class="action-btn" id="inviteBtn">👥 Invitar</button>
            <label class="action-btn primary">
                📁 Seleccionar Video
                <input type="file" id="fileInput" accept="video/*" hidden>
            </label>
            <button class="action-btn" id="chatToggle">💬 Chat</button>
        </div>
        <div class="modal" id="inviteMenu">
            <div class="modal-content">
                <h3>Link de Invitación</h3>
                <input type="text" id="inviteLink" readonly>
                <button class="action-btn primary" id="copyLinkBtn">Copiar Enlace</button>
                <button class="close-txt" id="closeInvite">Cerrar</button>
            </div>
        </div>
        <div class="chat-panel" id="chatPanel">
            <div class="chat-header"><span>Chat en vivo</span><button id="closeChat">✕</button></div>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" placeholder="Escribe algo...">
                <button id="sendBtn">➤</button>
            </div>
        </div>
    </div>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
