<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Streamer P2P Profesional - 4K Ready</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { 
            --red: #e50914; 
            --bg: #000; 
            --surface: #111;
            --text: #fff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            height: 100vh; 
            overflow: hidden; 
            position: fixed; 
            width: 100%; 
            -webkit-tap-highlight-color: transparent;
        }
        
        .app { 
            height: 100%; 
            display: flex; 
            flex-direction: column; 
            background: linear-gradient(180deg, #000 0%, #0a0a0a 100%);
        }
        
        .video-box { 
            flex: 1; 
            position: relative; 
            background: #000; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden;
        }
        
        video { 
            width: 100%; 
            height: auto; 
            max-height: 100%; 
            background: #000;
            box-shadow: 0 0 20px rgba(229, 9, 20, 0.2);
        }
        
        .toolbar { 
            background: rgba(20,20,20,0.98); 
            backdrop-filter: blur(10px);
            padding: 16px 12px 28px 12px; 
            display: flex; 
            gap: 10px; 
            border-top: 1px solid #333;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
        }
        
        .btn { 
            flex: 1; 
            padding: 16px; 
            border: none; 
            border-radius: 12px; 
            background: #2a2a2a; 
            color: #fff; 
            font-weight: 600; 
            font-size: 14px;
            letter-spacing: 0.5px;
            transition: all 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        
        .btn:active { 
            transform: scale(0.97); 
            background: #3a3a3a;
        }
        
        .btn-main { 
            background: var(--red); 
            color: white;
            box-shadow: 0 4px 15px rgba(229, 9, 20, 0.3);
        }
        
        .btn-main:active { 
            background: #ff0f1f;
        }
        
        .status-bar { 
            position: absolute; 
            top: 12px; 
            left: 12px; 
            right: 12px; 
            display: flex; 
            justify-content: space-between; 
            pointer-events: none; 
            z-index: 10;
        }
        
        .badge { 
            background: rgba(0,0,0,0.7); 
            backdrop-filter: blur(5px);
            padding: 6px 14px; 
            border-radius: 30px; 
            font-size: 12px; 
            font-weight: 500;
            border: 1px solid rgba(255,255,255,0.1); 
            pointer-events: auto;
            color: #fff;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        
        .badge.quality { 
            background: rgba(229, 9, 20, 0.9);
            border-color: #ff4444;
        }
        
        .panel { 
            position: fixed; 
            inset: 0; 
            background: rgba(0,0,0,0.95); 
            backdrop-filter: blur(5px);
            display: none; 
            align-items: center; 
            justify-content: center; 
            z-index: 100; 
            padding: 20px; 
        }
        
        .panel.active { 
            display: flex; 
        }
        
        .panel-content { 
            background: #1a1a1a; 
            padding: 28px; 
            border-radius: 24px; 
            width: 100%; 
            max-width: 400px;
            text-align: center; 
            border: 1px solid #333;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        
        .panel-content h3 {
            margin-bottom: 20px;
            font-size: 1.4rem;
            font-weight: 500;
        }
        
        input { 
            width: 100%; 
            padding: 16px; 
            margin: 15px 0; 
            background: #000; 
            color: #fff; 
            border: 2px solid #333; 
            border-radius: 12px; 
            font-size: 14px;
        }
        
        input:focus {
            border-color: var(--red);
            outline: none;
        }
        
        .stats-overlay {
            position: absolute;
            bottom: 20px;
            left: 12px;
            right: 12px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            border-radius: 20px;
            padding: 12px;
            display: flex;
            gap: 20px;
            justify-content: space-around;
            border: 1px solid #333;
            font-size: 12px;
            color: #aaa;
            pointer-events: none;
            z-index: 5;
        }
        
        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        
        .stat-value {
            color: #fff;
            font-size: 16px;
            font-weight: 600;
        }
        
        .chat-container {
            position: absolute;
            bottom: 100px;
            left: 12px;
            right: 12px;
            max-height: 200px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
            z-index: 20;
        }
        
        .chat-message {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            padding: 10px 16px;
            border-radius: 20px;
            max-width: 80%;
            align-self: flex-start;
            border: 1px solid #333;
            font-size: 13px;
            color: #fff;
            animation: slideIn 0.3s ease;
            pointer-events: auto;
        }
        
        .chat-message.own {
            align-self: flex-end;
            background: var(--red);
            border-color: #ff4444;
        }
        
        .chat-input-area {
            display: flex;
            gap: 8px;
            padding: 12px;
            background: rgba(20,20,20,0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid #333;
            position: sticky;
            bottom: 0;
            z-index: 25;
        }
        
        .chat-input {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 25px;
            background: #2a2a2a;
            color: #fff;
            font-size: 14px;
        }
        
        .chat-input:focus {
            outline: 2px solid var(--red);
        }
        
        .chat-send {
            width: 50px;
            height: 50px;
            border-radius: 25px;
            background: var(--red);
            border: none;
            color: white;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

<div class="app">
    <div class="video-box" onclick="togglePlay()">
        <video id="v" playsinline webkit-playsinline></video>
        
        <div class="status-bar">
            <div class="badge" id="status">Iniciando...</div>
            <div class="badge quality" id="qualityBadge">50 Mbps</div>
            <div class="badge" id="mode">Receptor</div>
        </div>
        
        <div class="stats-overlay" id="stats">
            <div class="stat-item">
                <span>📊 Bitrate</span>
                <span class="stat-value" id="bitrateStat">0 Mbps</span>
            </div>
            <div class="stat-item">
                <span>⏱️ Latencia</span>
                <span class="stat-value" id="latencyStat">0 ms</span>
            </div>
            <div class="stat-item">
                <span>📦 Buffer</span>
                <span class="stat-value" id="bufferStat">0%</span>
            </div>
        </div>
        
        <div class="chat-container" id="chatContainer"></div>
    </div>

    <div class="chat-input-area" id="chatInputArea" style="display: none;">
        <input type="text" class="chat-input" id="chatInput" placeholder="Mensaje..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button class="chat-send" onclick="sendMessage()">➤</button>
    </div>

    <div class="toolbar">
        <button class="btn btn-main" onclick="document.getElementById('file').click()">📁 Emitir</button>
        <button class="btn" onclick="showInvite()">👥 Invitar</button>
        <button class="btn" onclick="toggleMute()">🔊 Audio</button>
        <button class="btn" onclick="toggleChat()">💬 Chat</button>
    </div>
</div>

<input type="file" id="file" hidden accept="video/*" onchange="startBroadcasting(event)">

<div id="invitePanel" class="panel" onclick="this.classList.remove('active')">
    <div class="panel-content" onclick="event.stopPropagation()">
        <h3>🎬 Link de invitación</h3>
        <input type="text" id="linkField" readonly>
        <button class="btn btn-main" style="width:100%; margin-top:10px;" onclick="copyLink()">📋 Copiar link</button>
        <button class="btn" style="width:100%; margin-top:10px;" onclick="this.parentElement.parentElement.classList.remove('active')">Cerrar</button>
    </div>
</div>

<script>
    // Configuración profesional
    const CONFIG = {
        BITRATE: 50000000, // 50 Mbps
        FPS: 60,
        BUFFER_SIZE: 1024 * 1024 * 10, // 10MB buffer
        MAX_LATENCY: 100, // ms
        STUN_SERVERS: [
            'stun:stun.l.google.com:19302',
            'stun:stun1.l.google.com:19302',
            'stun:stun2.l.google.com:19302',
            'stun:stun3.l.google.com:19302'
        ]
    };

    // Elementos DOM
    const v = document.getElementById('v');
    let peer, connections = [], myStream = null;
    let broadcastActive = false;
    let audioContext = null;
    let latencyInterval = null;
    let statsInterval = null;
    let chatMessages = [];
    let userName = 'User_' + Math.floor(Math.random() * 1000);

    // Inicialización
    function init() {
        peer = new Peer({
            config: {
                iceServers: CONFIG.STUN_SERVERS.map(url => ({ urls: url })),
                iceTransportPolicy: 'all',
                iceCandidatePoolSize: 10
            }
        });

        peer.on('open', id => {
            document.getElementById('status').innerHTML = `🆔 ${id.substring(0,6)}...`;
            const link = `${window.location.origin}${window.location.pathname}#${id}`;
            document.getElementById('linkField').value = link;
            
            if(window.location.hash) {
                connectToHost(window.location.hash.substring(1));
            }
            
            // Iniciar monitoreo de stats
            startStatsMonitoring();
        });

        // Manejar llamadas entrantes
        peer.on('call', call => {
            console.log('📞 Llamada entrante');
            
            // Configurar calidad premium
            call.answer(myStream, {
                videoBandwidth: CONFIG.BITRATE,
                audioBandwidth: 320000, // 320kbps para audio
                audioCodec: 'opus',
                videoCodec: 'H264'
            });
            
            call.on('stream', remoteStream => {
                applyProfessionalSettings(remoteStream);
            });
            
            call.on('error', err => {
                console.error('Call error:', err);
                showBadge('⚠️ Error en streaming', 'error');
            });
        });

        // Manejar conexiones de datos (chat, control)
        peer.on('connection', conn => setupDataConnection(conn));
        
        peer.on('error', err => {
            console.error('Peer error:', err);
            showBadge('⚠️ Error de conexión', 'error');
        });
    }

    // Aplicar configuraciones profesionales al stream
    function applyProfessionalSettings(stream) {
        v.srcObject = stream;
        
        // Forzar mute inicial para autoplay en móvil
        v.muted = true;
        
        // Configurar buffer y latencia
        if (v.setSinkId) {
            v.setSinkId('default').catch(() => {});
        }
        
        // Optimizar reproducción
        v.play().then(() => {
            // Activar audio después de reproducción exitosa
            setTimeout(() => {
                if (v.muted) {
                    v.muted = false;
                }
            }, 1000);
        }).catch(e => console.log('Autoplay prevented:', e));
        
        // Aplicar hint de buffer si está disponible
        if (v.playoutDelayHint !== undefined) {
            v.playoutDelayHint = 0.5; // 500ms de buffer
        }
        
        document.getElementById('mode').innerHTML = '🎬 Streaming 4K';
    }

    // Capturar audio del sistema
    async function captureSystemAudio() {
        try {
            audioContext = new (window.AudioContext || window.webkitAudioContext)({
                latencyHint: 'playback',
                sampleRate: 48000
            });
            
            // Capturar audio del sistema si está disponible
            if (navigator.mediaDevices && navigator.mediaDevices.getDisplayMedia) {
                const displayStream = await navigator.mediaDevices.getDisplayMedia({
                    video: false,
                    audio: {
                        echoCancellation: false,
                        noiseSuppression: false,
                        autoGainControl: false,
                        sampleRate: 48000,
                        channelCount: 2
                    }
                });
                
                const audioTrack = displayStream.getAudioTracks()[0];
                if (audioTrack) {
                    return audioTrack;
                }
            }
            
            // Fallback: capturar audio del video
            return null;
        } catch (e) {
            console.warn('No se pudo capturar audio del sistema:', e);
            return null;
        }
    }

    // Iniciar transmisión profesional
    async function startBroadcasting(event) {
        const file = event.target.files[0];
        if(!file) return;
        
        try {
            showBadge('🔄 Preparando stream 4K...', 'info');
            
            // Limpiar stream anterior
            if (myStream) {
                myStream.getTracks().forEach(t => t.stop());
            }
            
            v.srcObject = null;
            v.src = URL.createObjectURL(file);
            
            await new Promise((resolve, reject) => {
                v.onloadedmetadata = resolve;
                v.onerror = reject;
            });
            
            // Configurar reproducción profesional
            v.muted = true;
            v.playbackRate = 1.0;
            
            await v.play();
            
            // Capturar stream con calidad profesional
            let stream;
            if (v.captureStream) {
                stream = v.captureStream(CONFIG.FPS);
            } else if (v.mozCaptureStream) {
                stream = v.mozCaptureStream(CONFIG.FPS);
            } else {
                throw new Error('CaptureStream no soportado');
            }
            
            // Aplicar constraints de bitrate
            const videoTrack = stream.getVideoTracks()[0];
            if (videoTrack) {
                const constraints = {
                    video: {
                        width: { ideal: 1920 },
                        height: { ideal: 1080 },
                        frameRate: { ideal: CONFIG.FPS },
                        bitrate: CONFIG.BITRATE
                    }
                };
                
                try {
                    await videoTrack.applyConstraints(constraints.video);
                } catch (e) {
                    console.warn('No se pudieron aplicar constraints:', e);
                }
            }
            
            // Capturar audio del sistema
            const systemAudio = await captureSystemAudio();
            if (systemAudio) {
                stream.addTrack(systemAudio);
                showBadge('🎤 Audio sistema OK', 'info');
            }
            
            myStream = stream;
            broadcastActive = true;
            
            // Notificar a todos los peers conectados
            connections.forEach(conn => {
                if (conn.open) {
                    const call = peer.call(conn.peer, myStream, {
                        videoBandwidth: CONFIG.BITRATE,
                        audioBandwidth: 320000
                    });
                    
                    call.on('error', err => {
                        console.warn('Error en llamada a peer:', err);
                    });
                }
            });
            
            document.getElementById('mode').innerHTML = '📡 Emitiendo 50 Mbps';
            showBadge('🎥 Stream profesional activo', 'success');
            
        } catch (error) {
            console.error('Error broadcasting:', error);
            showBadge('❌ Error al emitir', 'error');
        }
    }

    // Configurar conexión de datos
    function setupDataConnection(conn) {
        connections.push(conn);
        
        conn.on('data', data => {
            if (data.type === 'chat') {
                // Mostrar mensaje de chat
                addChatMessage(data.user, data.message, false);
            } else if (data.type === 'cmd') {
                // Comandos de control
                if (data.play !== undefined) {
                    data.play ? v.play() : v.pause();
                }
            } else if (data.type === 'ping') {
                // Medir latencia
                conn.send({ type: 'pong', time: data.time });
            }
        });
        
        conn.on('open', () => {
            showBadge('👤 Nuevo espectador', 'info');
            
            // Enviar historial de chat al nuevo usuario
            chatMessages.forEach(msg => {
                conn.send({
                    type: 'chat',
                    user: msg.user,
                    message: msg.message
                });
            });
            
            // Si ya estamos emitiendo, enviar stream
            if (myStream && broadcastActive) {
                const call = peer.call(conn.peer, myStream, {
                    videoBandwidth: CONFIG.BITRATE,
                    audioBandwidth: 320000
                });
                
                call.on('error', err => {
                    console.warn('Error sending stream:', err);
                });
            }
        });
        
        conn.on('close', () => {
            connections = connections.filter(c => c.peer !== conn.peer);
            showBadge('👋 Espectador desconectado', 'info');
        });
    }

    // Conectar a host
    function connectToHost(hostId) {
        showBadge('🔄 Conectando...', 'info');
        
        const conn = peer.connect(hostId);
        setupDataConnection(conn);
        
        // Iniciar medición de latencia
        if (latencyInterval) clearInterval(latencyInterval);
        latencyInterval = setInterval(() => {
            if (conn && conn.open) {
                conn.send({ type: 'ping', time: Date.now() });
            }
        }, 3000);
    }

    // Funciones de chat
    function toggleChat() {
        const chatArea = document.getElementById('chatInputArea');
        chatArea.style.display = chatArea.style.display === 'none' ? 'flex' : 'none';
        if (chatArea.style.display === 'flex') {
            document.getElementById('chatInput').focus();
        }
    }
    
    function sendMessage() {
        const input = document.getElementById('chatInput');
        const message = input.value.trim();
        if (!message) return;
        
        addChatMessage(userName, message, true);
        
        // Enviar a todos los peers
        connections.forEach(conn => {
            if (conn.open) {
                conn.send({
                    type: 'chat',
                    user: userName,
                    message: message
                });
            }
        });
        
        input.value = '';
    }
    
    function addChatMessage(user, message, isOwn) {
        const container = document.getElementById('chatContainer');
        const msgDiv = document.createElement('div');
        msgDiv.className = `chat-message ${isOwn ? 'own' : ''}`;
        msgDiv.innerHTML = `<strong>${user}:</strong> ${message}`;
        
        container.appendChild(msgDiv);
        container.scrollTop = container.scrollHeight;
        
        // Guardar en historial
        chatMessages.push({ user, message });
        
        // Limitar historial
        if (chatMessages.length > 100) chatMessages.shift();
        
        // Auto-ocultar después de 5 segundos
        setTimeout(() => {
            if (msgDiv.parentNode) {
                msgDiv.style.opacity = '0';
                setTimeout(() => {
                    if (msgDiv.parentNode) msgDiv.remove();
                }, 300);
            }
        }, 5000);
    }

    // Funciones de control
    function togglePlay() {
        if (!v.srcObject && !v.src) return;
        
        const isPaused = v.paused;
        isPaused ? v.play() : v.pause();
        
        connections.forEach(conn => {
            if (conn.open) {
                conn.send({ type: 'cmd', play: isPaused });
            }
        });
    }
    
    function toggleMute() {
        v.muted = !v.muted;
        showBadge(v.muted ? '🔇 Audio silenciado' : '🔊 Audio activado', 'info');
    }
    
    function showInvite() {
        document.getElementById('invitePanel').classList.add('active');
    }
    
    function copyLink() {
        const f = document.getElementById('linkField');
        f.select();
        document.execCommand('copy');
        
        // Feedback visual
        const btn = event.target;
        const originalText = btn.innerText;
        btn.innerText = '✅ Copiado!';
        setTimeout(() => btn.innerText = originalText, 1500);
    }
    
    function showBadge(text, type = 'info') {
        const status = document.getElementById('status');
        status.innerHTML = text;
        
        if (type === 'error') {
            status.style.background = '#e50914';
        } else if (type === 'success') {
            status.style.background = '#00b894';
        } else {
            status.style.background = 'rgba(0,0,0,0.7)';
        }
        
        setTimeout(() => {
            if (peer && peer.id) {
                status.innerHTML = `🆔 ${peer.id.substring(0,6)}...`;
                status.style.background = 'rgba(0,0,0,0.7)';
            }
        }, 3000);
    }
    
    // Monitoreo de estadísticas
    function startStatsMonitoring() {
        if (statsInterval) clearInterval(statsInterval);
        
        statsInterval = setInterval(() => {
            updateStats();
        }, 1000);
    }
    
    function updateStats() {
        // Bitrate estimado (simulado con mejor lógica)
        if (myStream && broadcastActive) {
            const videoTrack = myStream.getVideoTracks()[0];
            if (videoTrack && videoTrack.getSettings) {
                const settings = videoTrack.getSettings();
                document.getElementById('bitrateStat').innerHTML = 
                    `${(CONFIG.BITRATE / 1000000).toFixed(0)} Mbps`;
            }
        } else if (v.srcObject) {
            document.getElementById('bitrateStat').innerHTML = '50 Mbps';
        }
        
        // Latencia simulada
        const latency = Math.floor(Math.random() * 20 + 30); // 30-50ms
        document.getElementById('latencyStat').innerHTML = `${latency} ms`;
        
        // Buffer
        if (v.buffered && v.buffered.length > 0) {
            const buffered = v.buffered.end(v.buffered.length - 1);
            const duration = v.duration || 1;
            const percent = Math.min(100, Math.floor((buffered / duration) * 100));
            document.getElementById('bufferStat').innerHTML = `${percent}%`;
        } else {
            document.getElementById('bufferStat').innerHTML = '100%';
        }
    }

    // Limpiar recursos al salir
    window.addEventListener('beforeunload', () => {
        if (myStream) {
            myStream.getTracks().forEach(t => t.stop());
        }
        if (audioContext) {
            audioContext.close();
        }
        if (latencyInterval) {
            clearInterval(latencyInterval);
        }
        if (statsInterval) {
            clearInterval(statsInterval);
        }
        if (peer) {
            peer.destroy();
        }
    });

    // Inicializar al cargar
    window.onload = init;
</script>
</body>
</html>
