<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>P2P Cinema Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <div class="video-container">
            <video id="videoPlayer" playsinline></video>
            <div class="controls-overlay">
                <div class="top-bar">
                    <span id="peerIdDisplay" class="status-badge">Iniciando...</span>
                </div>
                <div class="bottom-controls">
                    <button onclick="togglePlay()" id="playPauseBtn" class="play-btn">▶</button>
                    <div class="progress-bar"><div id="progressFill" class="fill"></div></div>
                </div>
            </div>
        </div>

        <div class="action-bar">
            <button onclick="openInvite()" class="action-btn">👥 Invitar</button>
            <label class="action-btn primary">
                📁 Video <input type="file" id="fileInput" accept="video/*" hidden onchange="loadVideo(event)">
            </label>
            <button onclick="toggleChat()" class="action-btn">💬 Chat</button>
        </div>

        <div id="inviteMenu" class="modal">
            <div class="modal-content">
                <h3>Invitar Amigo</h3>
                <input type="text" id="inviteLink" readonly>
                <button onclick="copyLink()" class="action-btn primary">Copiar Enlace</button>
                <button onclick="closeInvite()" class="close-btn">Cerrar</button>
            </div>
        </div>

        <div id="chatPanel" class="chat-panel">
            <div class="chat-header"><span>Chat en vivo</span><button onclick="toggleChat()">✕</button></div>
            <div id="chatMessages" class="chat-box"></div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" placeholder="Escribe...">
                <button onclick="sendMsg()">➤</button>
            </div>
        </div>
    </div>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
