<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cinema P2P</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --red: #ff0000; --bg: #000; --ui: rgba(20, 20, 20, 0.95); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); color: #fff; height: 100vh; overflow: hidden; position: fixed; width: 100%; }

        /* Contenedor Principal */
        .app { height: 100%; display: flex; flex-direction: column; }

        /* Video Area */
        .video-box { flex: 1; position: relative; background: #000; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; max-height: 100vh; }

        /* Controles Flotantes sobre el video */
        .overlay { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: space-between; padding: 10px; pointer-events: none; }
        .top { display: flex; justify-content: space-between; pointer-events: auto; }
        .badge { background: rgba(0,0,0,0.6); padding: 5px 12px; border-radius: 20px; font-size: 11px; border: 1px solid #333; }
        
        /* Barra de herramientas - POSICIÓN CORREGIDA PARA MÓVIL */
        .toolbar { 
            background: var(--ui); 
            padding: 15px 10px 30px 10px; /* Más espacio abajo para evitar que el navegador lo tape */
            display: flex; 
            gap: 8px; 
            border-top: 1px solid #333;
            z-index: 100;
        }
        .btn { 
            flex: 1; 
            padding: 12px 5px; 
            border: none; 
            border-radius: 8px; 
            background: #252525; 
            color: #fff; 
            font-weight: bold; 
            font-size: 13px;
        }
        .btn-main { background: var(--red); }

        /* Modales y Chat */
        .panel { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; flex-direction: column; z-index: 200; padding: 20px; }
        .panel.active { display: flex; }
        .panel-content { background: #151515; padding: 20px; border-radius: 15px; text-align: center; margin: auto 0; }
        input[type="text"] { width: 100%; padding: 12px; margin: 10px 0; background: #000; color: #fff; border: 1px solid #444; border-radius: 8px; }
        
        #chatBox { flex: 1; overflow-y: auto; padding: 10px; border-bottom: 1px solid #333; margin-bottom: 10px; text-align: left; }
        .msg { margin-bottom: 8px; font-size: 14px; }
        .msg b { color: var(--red); }

        /* Barra de progreso */
        .progress-bar { position: absolute; bottom: 0; left: 0; width: 100%; height: 4px; background: #333; pointer-events: auto; cursor: pointer; }
        .progress-fill { height: 100%; background: var(--red); width: 0%; pointer-events: none; }
    </style>
</head>
<body>

<div class="app">
    <div class="video-box" onclick="togglePlay()">
        <video id="v" playsinline></video>
        <div class="overlay">
            <div class="top">
                <div class="badge" id="status">Iniciando...</div>
                <div class="badge" onclick="location.reload()">🔄</div>
            </div>
            <div class="progress-bar" onclick="seek(event)">
                <div class="progress-fill" id="fill"></div>
            </div>
        </div>
    </div>

    <div class="toolbar">
        <button class="btn btn-main" onclick="document.getElementById('file').click()">📁 Video</button>
        <button class="btn" onclick="showPanel('invite')">👥 Invitar</button>
        <button class="btn" onclick="showPanel('chat')">💬 Chat</button>
    </div>
</div>

<input type="file" id="file" hidden accept="video/*" onchange="loadV(event)">

<div id="invite" class="panel" onclick="closePanels(event)">
    <div class="panel-content" onclick="event.stopPropagation()">
        <h3>Compartir Sala</h3>
        <p style="font-size: 12px; color: #888; margin-top: 5px;">Tu amigo verá lo mismo que tú.</p>
        <input type="text" id="link" readonly>
        <button class="btn btn-main" style="width: 100%;" onclick="copy()">Copiar Link</button>
        <button class="btn" style="width: 100%; margin-top: 10px; background: none;" onclick="closePanels()">Cerrar</button>
    </div>
</div>

<div id="chat" class="panel">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <h3>Chat en vivo</h3>
        <button onclick="closePanels()" style="background: none; border: none; color: #fff; font-size: 20px;">✕</button>
    </div>
    <div id="chatBox"></div>
    <div style="display: flex; gap: 8px;">
        <input type="text" id="msgIn" placeholder="Escribe un mensaje..." style="margin: 0;">
        <button class="btn btn-main" onclick="send()" style="flex: 0 0 60px;">➤</button>
    </div>
</div>

<script>
    const v = document.getElementById('v');
    const fill = document.getElementById('fill');
    let peer, conns = [];

    // --- LÓGICA DE CONEXIÓN ---
    function init() {
        peer = new Peer();
        peer.on('open', id => {
            document.getElementById('status').innerText = "ID: " + id.substring(0,6);
            document.getElementById('link').value = window.location.origin + window.location.pathname + "#" + id;
            
            // Si entramos por un link, conectar automáticamente
            const hash = window.location.hash.substring(1);
            if(hash) connect(hash);
        });

        peer.on('connection', c => setupConn(c));
    }

    function connect(id) {
        const c = peer.connect(id);
        setupConn(c);
    }

    function setupConn(c) {
        c.on('open', () => {
            conns.push(c);
            addMsg("Sistema", "Amigo conectado");
            // Sincronizar tiempo actual al nuevo
            c.send({type: 'sync', time: v.currentTime});
        });
        c.on('data', d => {
            if(d.type === 'chat') addMsg("Amigo", d.msg);
            if(d.type === 'cmd') d.play ? v.play() : v.pause();
            if(d.type === 'sync') v.currentTime = d.time;
        });
    }

    // --- FUNCIONES VIDEO ---
    function loadV(e) {
        const f = e.target.files[0];
        if(f) {
            v.src = URL.createObjectURL(f);
            v.play();
        }
    }

    function togglePlay() {
        if(v.paused) { v.play(); broadcast({type:'cmd', play:true}); }
        else { v.pause(); broadcast({type:'cmd', play:false}); }
    }

    function seek(e) {
        const p = e.offsetX / e.target.offsetWidth;
        v.currentTime = p * v.duration;
        broadcast({type: 'sync', time: v.currentTime});
    }

    v.ontimeupdate = () => {
        fill.style.width = (v.currentTime / v.duration) * 100 + "%";
    };

    // --- UI Y CHAT ---
    function showPanel(id) { document.getElementById(id).classList.add('active'); }
    function closePanels() { 
        document.getElementById('invite').classList.remove('active'); 
        document.getElementById('chat').classList.remove('active'); 
    }

    function send() {
        const i = document.getElementById('msgIn');
        if(!i.value) return;
        addMsg("Tú", i.value);
        broadcast({type: 'chat', msg: i.value});
        i.value = "";
    }

    function addMsg(u, m) {
        const b = document.getElementById('chatBox');
        b.innerHTML += `<div class="msg"><b>${u}:</b> ${m}</div>`;
        b.scrollTop = b.scrollHeight;
    }

    function broadcast(d) {
        conns.forEach(c => { if(c.open) c.send(d); });
    }

    function copy() {
        const l = document.getElementById('link');
        l.select();
        document.execCommand('copy');
        alert("Link copiado. Pásalo a tu amigo.");
    }

    window.onload = init;
</script>

</body>
</html>
