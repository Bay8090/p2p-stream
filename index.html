<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>StreamP2P Pro</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #000;
            color: #fff;
            height: 100vh;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        /* Pantalla de autenticación */
        .auth-screen {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .auth-screen.hidden {
            display: none;
        }

        .auth-card {
            background: #111;
            border-radius: 16px;
            padding: 32px 24px;
            width: min(90%, 320px);
            border: 1px solid #222;
            text-align: center;
        }

        .auth-logo {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .auth-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 24px;
            color: #e50914;
        }

        .auth-input {
            width: 100%;
            padding: 14px;
            background: #222;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            margin-bottom: 16px;
        }

        .auth-input:focus {
            outline: none;
            border-color: #e50914;
        }

        .auth-button {
            width: 100%;
            padding: 14px;
            background: #e50914;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
        }

        .auth-button:active {
            background: #b2070f;
        }

        /* App principal */
        .app {
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #000;
        }

        /* Header con título y botones */
        .header {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #000;
            border-bottom: 1px solid #222;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .app-title {
            font-size: 20px;
            font-weight: 600;
            color: #e50914;
        }

        .movie-title {
            font-size: 14px;
            color: #999;
            max-width: 200px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-button {
            padding: 8px 16px;
            background: #222;
            border: 1px solid #333;
            border-radius: 20px;
            color: #fff;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .header-button:active {
            background: #333;
        }

        .header-button.primary {
            background: #e50914;
            border: none;
        }

        .header-button.primary:active {
            background: #b2070f;
        }

        /* Video container */
        .video-container {
            flex: 1;
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Controles de video overlay */
        .video-controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            border-radius: 30px;
            border: 1px solid #333;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .video-container:hover .video-controls,
        .video-controls.visible {
            opacity: 1;
        }

        .control-button {
            width: 40px;
            height: 40px;
            border-radius: 20px;
            background: #222;
            border: 1px solid #444;
            color: white;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .control-button:active {
            background: #e50914;
        }

        .progress-bar {
            flex: 1;
            height: 4px;
            background: #333;
            border-radius: 2px;
            position: relative;
            cursor: pointer;
        }

        .progress-fill {
            height: 100%;
            background: #e50914;
            border-radius: 2px;
            width: 0%;
        }

        .time-display {
            color: #999;
            font-size: 14px;
            min-width: 80px;
        }

        /* Panel flotante de audio/subtítulos */
        .media-panel {
            position: absolute;
            bottom: 100px;
            right: 20px;
            width: 280px;
            background: #111;
            border: 1px solid #333;
            border-radius: 16px;
            overflow: hidden;
            display: none;
            z-index: 100;
        }

        .media-panel.active {
            display: block;
        }

        .media-panel-header {
            padding: 16px;
            background: #1a1a1a;
            border-bottom: 1px solid #333;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .media-panel-section {
            padding: 12px 16px;
            border-bottom: 1px solid #222;
        }

        .media-panel-section h4 {
            color: #999;
            font-size: 11px;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .media-track {
            padding: 10px 12px;
            background: #1a1a1a;
            border-radius: 8px;
            margin-bottom: 6px;
            cursor: pointer;
            border-left: 3px solid transparent;
        }

        .media-track.active {
            border-left-color: #e50914;
            background: #222;
        }

        .media-track-title {
            font-size: 13px;
            font-weight: 500;
        }

        .media-track-desc {
            font-size: 11px;
            color: #999;
            margin-top: 2px;
        }

        .close-button {
            width: 30px;
            height: 30px;
            border-radius: 15px;
            background: #222;
            border: 1px solid #444;
            color: #fff;
            cursor: pointer;
        }

        /* Chat panel */
        .chat-panel {
            position: absolute;
            bottom: 100px;
            left: 20px;
            width: 280px;
            background: #111;
            border: 1px solid #333;
            border-radius: 16px;
            overflow: hidden;
            display: none;
            z-index: 100;
        }

        .chat-panel.active {
            display: block;
        }

        .chat-header {
            padding: 16px;
            background: #1a1a1a;
            border-bottom: 1px solid #333;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-messages {
            height: 250px;
            overflow-y: auto;
            padding: 16px;
        }

        .chat-message {
            margin-bottom: 12px;
        }

        .chat-message .user {
            font-size: 11px;
            color: #e50914;
            margin-bottom: 2px;
        }

        .chat-message .text {
            font-size: 13px;
            color: #fff;
            background: #1a1a1a;
            padding: 8px 12px;
            border-radius: 12px;
            max-width: 90%;
        }

        .chat-message.own .text {
            background: #e50914;
            margin-left: auto;
        }

        .chat-input-area {
            padding: 12px;
            border-top: 1px solid #333;
            display: flex;
            gap: 8px;
        }

        .chat-input-area input {
            flex: 1;
            padding: 10px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 20px;
            color: #fff;
            font-size: 13px;
        }

        .chat-input-area input:focus {
            outline: none;
            border-color: #e50914;
        }

        .chat-input-area button {
            width: 40px;
            height: 40px;
            border-radius: 20px;
            background: #e50914;
            border: none;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        /* Botón de chat flotante */
        .chat-button {
            position: absolute;
            bottom: 100px;
            left: 20px;
            width: 50px;
            height: 50px;
            border-radius: 25px;
            background: #e50914;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(229, 9, 20, 0.3);
            z-index: 90;
        }

        .chat-button.hidden {
            display: none;
        }

        /* Input file oculto */
        #fileInput {
            display: none;
        }

        #subtitleInput {
            display: none;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .movie-title {
                max-width: 120px;
            }
            
            .header-button span {
                display: none;
            }
            
            .header-button {
                padding: 8px 12px;
            }
        }
    </style>
</head>
<body>
    <!-- Pantalla de autenticación -->
    <div class="auth-screen" id="authScreen">
        <div class="auth-card">
            <div class="auth-logo">🎬</div>
            <div class="auth-title">StreamP2P Pro</div>
            <input type="text" class="auth-input" id="nicknameInput" placeholder="Tu nombre" autofocus>
            <button class="auth-button" onclick="joinRoom()">Entrar</button>
        </div>
    </div>

    <!-- App principal -->
    <div class="app" id="app" style="display: none;">
        <!-- Header con título y botones -->
        <div class="header">
            <div class="header-left">
                <span class="app-title">StreamP2P Pro</span>
                <span class="movie-title" id="movieTitle">Hellraiser 4 1996 ITA ENG UHDrip HDR</span>
            </div>
            <div class="header-right">
                <button class="header-button" onclick="showInvite()">
                    <span>🔗</span>
                    <span>Invitar</span>
                </button>
                <button class="header-button primary" onclick="document.getElementById('fileInput').click()">
                    <span>📁</span>
                    <span>Seleccionar archivo</span>
                </button>
                <button class="header-button" onclick="toggleChat()">
                    <span>💬</span>
                    <span>Chat</span>
                </button>
            </div>
        </div>

        <!-- Video container -->
        <div class="video-container" id="videoContainer">
            <video id="videoPlayer" playsinline webkit-playsinline></video>
            
            <!-- Controles de video -->
            <div class="video-controls" id="videoControls">
                <button class="control-button" onclick="togglePlayPause()" id="playPauseBtn">⏸️</button>
                <button class="control-button" onclick="toggleMute()" id="muteBtn">🔊</button>
                <div class="progress-bar" onclick="seek(event)">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <span class="time-display" id="timeDisplay">0:00 / 0:00</span>
                <button class="control-button" onclick="toggleFullscreen()">⛶</button>
                <button class="control-button" onclick="toggleMediaPanel()">🔊</button>
            </div>

            <!-- Panel de audio y subtítulos -->
            <div class="media-panel" id="mediaPanel">
                <div class="media-panel-header">
                    <span>Audio y subtítulos</span>
                    <button class="close-button" onclick="toggleMediaPanel()">✕</button>
                </div>
                
                <div class="media-panel-section">
                    <h4>Audio</h4>
                    <div id="audioTracksList">
                        <div class="media-track active">
                            <div class="media-track-title">E-AC3 5.1ch 1536kbps</div>
                            <div class="media-track-desc">English</div>
                        </div>
                        <div class="media-track">
                            <div class="media-track-title">E-AC3 2.0ch 192kbps</div>
                            <div class="media-track-desc">Italian</div>
                        </div>
                    </div>
                </div>
                
                <div class="media-panel-section">
                    <h4>Subtítulos</h4>
                    <div class="media-track" onclick="disableSubtitles()">
                        <div class="media-track-title">Desactivar</div>
                    </div>
                    <div class="media-track" onclick="loadSubtitles()">
                        <div class="media-track-title">DIALOGHI</div>
                        <div class="media-track-desc">English</div>
                    </div>
                    <div class="media-track" onclick="loadSubtitles()">
                        <div class="media-track-title">NON UDENTI</div>
                        <div class="media-track-desc">English</div>
                    </div>
                    <div class="media-track" onclick="document.getElementById('subtitleInput').click()">
                        <div class="media-track-title">📁 Cargar subtítulos</div>
                    </div>
                </div>
            </div>

            <!-- Botón de chat flotante -->
            <button class="chat-button" id="chatButton" onclick="toggleChat()">💬</button>

            <!-- Panel de chat -->
            <div class="chat-panel" id="chatPanel">
                <div class="chat-header">
                    <span>Chat</span>
                    <button class="close-button" onclick="toggleChat()">✕</button>
                </div>
                <div class="chat-messages" id="chatMessages"></div>
                <div class="chat-input-area">
                    <input type="text" id="chatInput" placeholder="Escribe un mensaje..." onkeypress="if(event.key==='Enter') sendMessage()">
                    <button onclick="sendMessage()">➤</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Inputs ocultos -->
    <input type="file" id="fileInput" accept="video/*" onchange="handleFileSelect(event)">
    <input type="file" id="subtitleInput" accept=".srt,.vtt,text/plain" onchange="handleSubtitleSelect(event)">

    <script>
        // Configuración
        const CONFIG = {
            BITRATE: 5000000,
            FPS: 60,
            STUN_SERVERS: ['stun:stun.l.google.com:19302']
        };

        // Elementos DOM
        const video = document.getElementById('videoPlayer');
        const authScreen = document.getElementById('authScreen');
        const app = document.getElementById('app');
        const videoControls = document.getElementById('videoControls');
        const mediaPanel = document.getElementById('mediaPanel');
        const chatPanel = document.getElementById('chatPanel');
        const chatButton = document.getElementById('chatButton');
        const movieTitle = document.getElementById('movieTitle');

        // Estado
        let peer = null;
        let connections = [];
        let myStream = null;
        let currentUser = { name: '', id: '' };
        let participants = [];
        let controlsTimeout = null;
        let currentFile = null;

        // Unirse a la sala
        function joinRoom() {
            const nickname = document.getElementById('nicknameInput').value.trim();
            if (!nickname) {
                alert('Ingresa tu nombre');
                return;
            }

            currentUser.name = nickname;
            authScreen.style.display = 'none';
            app.style.display = 'flex';
            
            initPeer();
            setupVideoListeners();
        }

        // Inicializar PeerJS
        function initPeer() {
            peer = new Peer({
                config: { iceServers: CONFIG.STUN_SERVERS.map(url => ({ urls: url })) }
            });

            peer.on('open', id => {
                currentUser.id = id;
                console.log('Mi ID:', id);
            });

            peer.on('call', call => {
                if (myStream) {
                    call.answer(myStream);
                    call.on('stream', remoteStream => {
                        video.srcObject = remoteStream;
                        video.play().catch(() => {});
                    });
                }
            });

            peer.on('connection', setupDataConnection);
        }

        // Conexión de datos
        function setupDataConnection(conn) {
            connections.push(conn);
            
            conn.on('data', data => {
                if (data.type === 'chat') {
                    addChatMessage(data.user, data.message, false);
                }
            });
        }

        // Listeners del video
        function setupVideoListeners() {
            video.addEventListener('timeupdate', updateProgress);
            video.addEventListener('loadedmetadata', () => {
                updateTimeDisplay();
                if (video.videoWidth) {
                    movieTitle.textContent = `${video.videoWidth}p • ${video.videoHeight}p`;
                }
            });

            videoContainer.addEventListener('mousemove', showControls);
            videoContainer.addEventListener('touchstart', showControls);
        }

        // Controles de video
        function showControls() {
            videoControls.classList.add('visible');
            if (controlsTimeout) clearTimeout(controlsTimeout);
            controlsTimeout = setTimeout(() => {
                if (!mediaPanel.classList.contains('active') && !chatPanel.classList.contains('active')) {
                    videoControls.classList.remove('visible');
                }
            }, 3000);
        }

        function togglePlayPause() {
            if (video.paused) {
                video.play();
                document.getElementById('playPauseBtn').textContent = '⏸️';
            } else {
                video.pause();
                document.getElementById('playPauseBtn').textContent = '▶️';
            }
            showControls();
        }

        function toggleMute() {
            video.muted = !video.muted;
            document.getElementById('muteBtn').textContent = video.muted ? '🔇' : '🔊';
            showControls();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                videoContainer.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
            showControls();
        }

        function seek(event) {
            const rect = event.currentTarget.getBoundingClientRect();
            const pos = (event.clientX - rect.left) / rect.width;
            video.currentTime = pos * video.duration;
            showControls();
        }

        function updateProgress() {
            if (video.duration) {
                const percent = (video.currentTime / video.duration) * 100;
                document.getElementById('progressFill').style.width = percent + '%';
                updateTimeDisplay();
            }
        }

        function updateTimeDisplay() {
            const current = formatTime(video.currentTime);
            const total = formatTime(video.duration);
            document.getElementById('timeDisplay').textContent = `${current} / ${total}`;
        }

        function formatTime(seconds) {
            if (isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        // Manejo de archivos
        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            currentFile = file;
            movieTitle.textContent = file.name;

            const url = URL.createObjectURL(file);
            video.src = url;
            video.play();

            // Capturar stream para broadcasting
            setTimeout(() => {
                if (video.captureStream) {
                    myStream = video.captureStream(CONFIG.FPS);
                    
                    // Notificar a peers
                    connections.forEach(conn => {
                        if (conn.open) {
                            peer.call(conn.peer, myStream);
                        }
                    });
                }
            }, 1000);
        }

        // Audio y subtítulos
        function toggleMediaPanel() {
            mediaPanel.classList.toggle('active');
            if (mediaPanel.classList.contains('active')) {
                videoControls.classList.add('visible');
            }
        }

        function loadSubtitles() {
            document.getElementById('subtitleInput').click();
        }

        function handleSubtitleSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const blob = new Blob([e.target.result], { type: 'text/vtt' });
                const url = URL.createObjectURL(blob);
                
                const track = document.createElement('track');
                track.kind = 'subtitles';
                track.label = file.name;
                track.srclang = 'en';
                track.src = url;
                track.default = true;
                
                video.appendChild(track);
                
                track.addEventListener('load', () => {
                    video.textTracks[0].mode = 'showing';
                });
            };
            reader.readAsText(file);
        }

        function disableSubtitles() {
            for (let i = 0; i < video.textTracks.length; i++) {
                video.textTracks[i].mode = 'disabled';
            }
        }

        // Chat
        function toggleChat() {
            chatPanel.classList.toggle('active');
            chatButton.classList.toggle('hidden');
            if (chatPanel.classList.contains('active')) {
                videoControls.classList.add('visible');
            }
        }

        function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            if (!message) return;

            addChatMessage(currentUser, message, true);

            connections.forEach(conn => {
                if (conn.open) {
                    conn.send({
                        type: 'chat',
                        user: currentUser,
                        message: message
                    });
                }
            });

            input.value = '';
        }

        function addChatMessage(user, message, isOwn) {
            const container = document.getElementById('chatMessages');
            const msgDiv = document.createElement('div');
            msgDiv.className = `chat-message ${isOwn ? 'own' : ''}`;
            msgDiv.innerHTML = `
                <div class="user">${user.name}</div>
                <div class="text">${message}</div>
            `;
            container.appendChild(msgDiv);
            container.scrollTop = container.scrollHeight;
        }

        // Invitar
        function showInvite() {
            const link = `${window.location.origin}${window.location.pathname}#${currentUser.id}`;
            prompt('Comparte este enlace:', link);
        }
    </script>
</body>
</html>
